<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LCEL Pipeline Interface</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 800px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #333;
            font-weight: 500;
            margin-bottom: 8px;
            font-size: 14px;
        }

        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-family: inherit;
            font-size: 14px;
            resize: vertical;
            min-height: 100px;
            transition: border-color 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
            background-color: #f8f9ff;
        }

        .button-group {
            display: flex;
            gap: 10px;
        }

        button {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .submit-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .submit-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .clear-btn {
            background: #f0f0f0;
            color: #333;
        }

        .clear-btn:hover {
            background: #e0e0e0;
        }

        .result-section {
            margin-top: 30px;
            display: none;
        }

        .result-section.show {
            display: block;
        }

        .result-section h2 {
            color: #333;
            font-size: 18px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }

        .result-content {
            background: #f8f9ff;
            padding: 20px;
            border-radius: 6px;
            line-height: 1.6;
            color: #333;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .error-message {
            background: #fee;
            border: 1px solid #fcc;
            color: #c33;
            padding: 15px;
            border-radius: 6px;
            margin-top: 20px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .loading {
            display: none;
            text-align: center;
            color: #666;
            margin-top: 15px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #e0e0e0;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .question-display {
            background: #e8eaf6;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 15px;
            color: #333;
            font-size: 14px;
        }

        .question-display strong {
            color: #667eea;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 24px;
            }

            .button-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 LCEL Pipeline</h1>
        <p class="subtitle">Decompose → Answer → Combine</p>

        <div class="form-group">
            <label for="question">Enter your question:</label>
            <textarea id="question" placeholder="Ask a complex question..."></textarea>
        </div>

        <div class="button-group">
            <button class="submit-btn" id="submitBtn" onclick="processQuestion()">Process</button>
            <button class="clear-btn" onclick="clearForm()">Clear</button>
        </div>

        <div class="loading" id="loading">
            <span class="spinner"></span>
            Processing your question...
        </div>

        <div class="error-message" id="errorMessage"></div>

        <div class="result-section" id="resultSection">
            <div class="question-display">
                <strong>Question:</strong> <span id="questionDisplay"></span>
            </div>
            <h2>Result</h2>
            <div class="result-content" id="resultContent"></div>
        </div>
    </div>

    <script>
        async function processQuestion() {
            const question = document.getElementById("question").value.trim();
            const errorEl = document.getElementById("errorMessage");
            const resultEl = document.getElementById("resultSection");
            const loadingEl = document.getElementById("loading");
            const submitBtn = document.getElementById("submitBtn");

            // Clear previous errors and results
            errorEl.classList.remove("show");
            resultEl.classList.remove("show");
            errorEl.textContent = "";

            // Validate input
            if (!question) {
                errorEl.textContent = "Please enter a question.";
                errorEl.classList.add("show");
                return;
            }

            // Show loading
            loadingEl.classList.add("show");
            submitBtn.disabled = true;

            try {
                const response = await fetch("/api/process", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify({ question: question })
                });

                const data = await response.json();

                loadingEl.classList.remove("show");

                if (data.success) {
                    document.getElementById("questionDisplay").textContent = question;
                    document.getElementById("resultContent").textContent = data.result;
                    resultEl.classList.add("show");
                } else {
                    errorEl.textContent = "Error: " + (data.error || "Unknown error occurred");
                    errorEl.classList.add("show");
                }
            } catch (error) {
                loadingEl.classList.remove("show");
                errorEl.textContent = "Network error: " + error.message;
                errorEl.classList.add("show");
            } finally {
                submitBtn.disabled = false;
            }
        }

        function clearForm() {
            document.getElementById("question").value = "";
            document.getElementById("resultSection").classList.remove("show");
            document.getElementById("errorMessage").classList.remove("show");
            document.getElementById("question").focus();
        }

        // Allow Enter key to submit (Ctrl+Enter or Cmd+Enter for multiline)
        document.getElementById("question").addEventListener("keydown", function(e) {
            if ((e.ctrlKey || e.metaKey) && e.key === "Enter") {
                processQuestion();
            }
        });

        // Focus on load
        document.getElementById("question").focus();
    </script>
</body>
</html>
